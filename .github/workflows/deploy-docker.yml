name: Deploy Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nodeapp .

      - name: Save Docker image
        run: docker save nodeapp | gzip > nodeapp.tar.gz

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'un-valor-para-que-no-de-error'

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to VM
        run: scp nodeapp.tar.gz pm161@${{ secrets.SSH_HOST }}:~/

      - name: Deploy Docker container
        run: |
          ssh pm161@${{ secrets.SSH_HOST }} "docker load < ~/nodeapp.tar.gz"
          ssh pm161@${{ secrets.SSH_HOST }} "docker stop nodeapp || true"
          ssh pm161@${{ secrets.SSH_HOST }} "docker rm nodeapp || true"
          ssh pm161@${{ secrets.SSH_HOST }} "docker run -d --name nodeapp -p 3000:3000 nodeapp"