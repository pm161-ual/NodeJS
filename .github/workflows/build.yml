name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:20-alpine

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm run test-jenkins

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results
          path: ./coverage/test.results.xml